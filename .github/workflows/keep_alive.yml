name: Render Keep Alive

on:
  schedule:
    - cron: '*/12 * * * *'  # Runs every 12 minutes to prevent Render's 15-minute sleep timer
  workflow_dispatch:        # Allows manual triggering from the GitHub Actions UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render App
        run: |
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" https://vpn-sentinel.onrender.com/
